# xiaozhi-mcp-server Configuration

# Server port (冷门端口避免冲突)
port: 28765

# Token (auto-generated if empty)
# Set your own token or leave empty for auto-generation
token: ""

# xiaozhi-esp32 target session (for run_agent tool)
# Format: qqbot:c2c:USER_ID or other OpenClaw session format
target_session: ""

# Task timeout in seconds
task_timeout: 180

# Log level: debug, info, warn, error
log_level: info